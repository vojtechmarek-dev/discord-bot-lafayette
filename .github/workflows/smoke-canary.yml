name: Smoke Canary

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"

jobs:
  smoke-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run voice/media smoke canary
        env:
          DISCORD_TOKEN_CANARY: ${{ secrets.DISCORD_TOKEN_CANARY }}
          CANARY_GUILD_ID: ${{ secrets.CANARY_GUILD_ID }}
          CANARY_VOICE_CHANNEL_ID: ${{ secrets.CANARY_VOICE_CHANNEL_ID }}
          CANARY_TEXT_CHANNEL_ID: ${{ secrets.CANARY_TEXT_CHANNEL_ID }}
          CANARY_QUERY: ${{ secrets.CANARY_QUERY }}
          DP_FFMPEG_PATH: ${{ secrets.DP_FFMPEG_PATH }}
        run: npm run smoke:canary
